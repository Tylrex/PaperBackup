# Folder where backups will be saved. Can be relative path from server root (e.g. 'backups') or absolute path.
backup-folder: "backups"

# Maximum number of backups to keep in the backup folder.
# Set to -1 to disable this limit.
max-backups: 10

# Safety floor for automatic cleanup.
# PaperBackup will never delete below this many backup-*.zip files, even if size/count limits are too strict.
minimum-backups-to-keep: 1

# Maximum total size of all backups in the backup folder (in Megabytes).
# Set to -1 to disable this limit.
# Example: 10240 is 10 GB.
max-total-size-mb: 10240

# How often (in minutes) to perform automated backups.
# Set to 0 or -1 to disable automatic backups.
backup-interval-minutes: 60

# Delay before a missed scheduled backup starts after server boot, in seconds.
# This gives worlds and other plugins time to finish startup.
startup-delay-seconds: 60

# true = if the server was offline when the next backup time passed, run one backup after startup-delay-seconds.
# false = skip missed backups and schedule the next future interval.
catch-up-missed-backup-on-start: true

# Save all loaded worlds on the main thread before the async ZIP task starts.
# This makes world files on disk more consistent for backups.
save-worlds-before-backup: true

# Memory diagnostics/tuning.
memory:
  # false by default: JVM garbage collection is automatic.
  # Enable only if your hosting panel shows RAM staying high after backups.
  # This asks the JVM to clean unused backup/upload objects after a backup.
  request-gc-after-backup: false

# Google Drive storage.
# When enabled, PaperBackup streams the ZIP directly to Google Drive.
# No local backup-*.zip file is created on the server.
google-drive:
  enabled: false
  # OAUTH = use your Google account quota. Recommended for normal personal Google Drive.
  # SERVICE_ACCOUNT = only for Google Workspace Shared Drives or advanced domain delegation.
  auth-mode: "OAUTH"

  # Service account JSON path. Used only when auth-mode is SERVICE_ACCOUNT.
  # Relative paths are resolved from the server root.
  service-account-file: "plugins/PaperBackup/google-service-account.json"

  # OAuth credentials. Used when auth-mode is OAUTH.
  # The refresh token must be generated with the Google Drive scope:
  # https://www.googleapis.com/auth/drive
  oauth:
    client-id: "PUT_OAUTH_CLIENT_ID_HERE"
    client-secret: "PUT_OAUTH_CLIENT_SECRET_HERE"
    refresh-token: "PUT_OAUTH_REFRESH_TOKEN_HERE"

  # Google Drive folder ID where backups are uploaded.
  folder-id: "PUT_GOOGLE_DRIVE_FOLDER_ID_HERE"
  # Resumable upload chunk size in KB. Lower values use less temporary memory.
  # Google requires chunks to be multiples of 256 KB; 256 is the lowest value.
  upload-chunk-size-kb: 256
  # Internal pipe buffer between the ZIP writer and Google uploader.
  # Keep this small on memory-limited hosting.
  pipe-buffer-size-kb: 256
  # false = release the cached Google Drive client after every backup.
  # This slightly increases setup work for each backup, but keeps less memory retained.
  keep-client-between-backups: false
  # Retention for files in the Google Drive folder.
  # Only backup-*.zip files in this folder are touched.
  max-backups: 10
  minimum-backups-to-keep: 1
  max-total-size-mb: 10240

# Files and directories to exclude from the backup.
# Path comparisons are done relative to the server root directory.
# Backups folder is automatically excluded.
exclude-paths:
  - "backups"
  - "cache"
  - "logs"
  - "plugins/PaperBackup/backups"
  - ".git"
  - "crash-reports"
  - "webdoc"
  - "session.lock"
  - "world/session.lock"
  - "world_nether/session.lock"
  - "world_the_end/session.lock"
