name: Java CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and test
      run: mvn -B clean verify
