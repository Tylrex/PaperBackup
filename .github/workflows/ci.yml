name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build

      - name: Commit jar to artifacts/
        if: github.event_name == 'push'
        run: |
          mkdir -p artifacts
          cp build/libs/PaperBackup-GoogleDrive-*.jar artifacts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          git diff --staged --quiet || git commit -m "ci: update plugin jar [skip ci]"
          git push
